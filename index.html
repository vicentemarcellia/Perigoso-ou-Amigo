<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Perigoso ou Amigo?</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f0f8ff;
padding:20px;
}

h1{
color:#333;
}

#mascote{
font-size:70px;
}

#animal{
font-size:160px;
margin:20px;
}

button{
font-size:20px;
padding:15px 30px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
}

.perigoso{
background:#ff6b6b;
color:white;
}

.amigo{
background:#4ecdc4;
color:white;
}

#resultado{
font-size:24px;
margin-top:10px;
font-weight:bold;
}

#explicacao{
font-size:18px;
margin-top:10px;
color:#444;
}

#placar{
margin-top:15px;
font-size:22px;
}

.acerto{
animation:pular 0.4s;
}

@keyframes pular{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div id="mascote">⭐🙂</div>

<h1>Perigoso ou Amigo?</h1>

<p>A estrelinha da evangelização quer aprender com vocês!</p>

<div id="animal"></div>

<div>

<button class="perigoso" onclick="responder('perigoso')">
⚠️ Perigoso
</button>

<button class="amigo" onclick="responder('amigo')">
💛 Amigo
</button>

</div>

<div id="resultado"></div>
<div id="explicacao"></div>

<br>

<button onclick="proximo()">Próximo</button>

<div id="placar">Pontos da turma: 0</div>

<audio id="som">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>

const jogo = [

{
animal:"🐶",
resposta:"amigo",
explicacao:"O cachorro costuma ser um grande amigo das pessoas."
},

{
animal:"🦁",
resposta:"perigoso",
explicacao:"O leão é forte e vive na natureza. Devemos observar de longe."
},

{
animal:"🐝",
resposta:"perigoso",
explicacao:"A abelha pode picar se ficar assustada, mas ajuda as flores."
},

{
animal:"🐸",
resposta:"amigo",
explicacao:"O sapo ajuda a natureza comendo insetos."
},

{
animal:"🐢",
resposta:"amigo",
explicacao:"A tartaruga é tranquila e não faz mal às pessoas."
},

{
animal:"🕷️",
resposta:"perigoso",
explicacao:"Algumas aranhas podem picar, por isso não devemos mexer."
},

{
animal:"🦋",
resposta:"amigo",
explicacao:"A borboleta é delicada e ajuda a natureza."
},

{
animal:"🐱",
resposta:"amigo",
explicacao:"O gato pode ser um companheiro carinhoso."
},

{
animal:"🐍",
resposta:"perigoso",
explicacao:"Algumas cobras são perigosas e devemos manter distância."
}

]

let atual = 0
let pontos = 0

function mostrar(){

document.getElementById("animal").innerHTML = jogo[atual].animal
document.getElementById("resultado").innerHTML = ""
document.getElementById("explicacao").innerHTML = ""

}

function responder(escolha){

let correto = jogo[atual].resposta

if(escolha == correto){

document.getElementById("resultado").innerHTML = "🎉 Muito bem!"
document.getElementById("som").play()

pontos++

document.getElementById("animal").classList.add("acerto")

}else{

document.getElementById("resultado").innerHTML = "🙂 Vamos aprender!"

}

document.getElementById("explicacao").innerHTML =
jogo[atual].explicacao

document.getElementById("placar").innerHTML =
"Pontos da turma: " + pontos

}

function proximo(){

document.getElementById("animal").classList.remove("acerto")

atual++

if(atual >= jogo.length){

document.body.innerHTML = `
<h1>🎉 Parabéns!</h1>
<h2>Vocês aprenderam sobre os animais criados por Deus.</h2>
<h2>Pontuação da turma: ${pontos}</h2>
`

return

}

mostrar()

}

mostrar()

</script>

</body>
</html>
