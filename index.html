<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Perigoso ou Amigo?</title>

<style>

body{
font-family: Arial;
background:#eef7ff;
text-align:center;
}

h1{
margin-top:20px;
}

#tabuleiro{
display:grid;
grid-template-columns: repeat(4,140px);
gap:20px;
justify-content:center;
margin-top:30px;
}

.carta{
width:140px;
height:140px;
perspective:1000px;
cursor:pointer;
}

.carta-inner{
position:relative;
width:100%;
height:100%;
transition:transform 0.6s;
transform-style:preserve-3d;
}

.carta.virada .carta-inner{
transform:rotateY(180deg);
}

.carta-frente, .carta-verso{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.carta-frente{
background:#4a90e2;
color:white;
font-size:28px;
}

.carta-verso{
background:white;
transform:rotateY(180deg);
}

.animal{
font-size:50px;
}

.nome{
font-size:16px;
}

button{
font-size:18px;
padding:10px 20px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.perigoso{
background:#ff6b6b;
color:white;
}

.amigo{
background:#4ecdc4;
color:white;
}

#resposta{
font-size:24px;
margin-top:15px;
}

#explicacao{
font-size:18px;
margin-top:10px;
max-width:600px;
margin-left:auto;
margin-right:auto;
}

.confete{
position:fixed;
width:10px;
height:10px;
top:0;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<h1>Perigoso ou Amigo?</h1>
<p>Vire a carta e descubra!</p>

<div id="tabuleiro"></div>

<div id="botoes" style="display:none">

<button class="perigoso" onclick="responder('perigoso')">
⚠️ Perigoso
</button>

<button class="amigo" onclick="responder('amigo')">
💛 Amigo
</button>

</div>

<div id="resposta"></div>
<div id="explicacao"></div>

<audio id="musica" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7f1c88c7d0.mp3">
</audio>

<audio id="somCarta">
<source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3">
</audio>

<script>

const musica = document.getElementById("musica")

document.body.addEventListener("click", () => {
musica.play()
},{once:true})

const animais = [

{nome:"Cachorro",emoji:"🐶",resposta:"amigo",
explicacao:"O cachorro costuma ser amigo das pessoas."},

{nome:"Leão",emoji:"🦁",resposta:"perigoso",
explicacao:"O leão é forte e vive na natureza."},

{nome:"Abelha",emoji:"🐝",resposta:"perigoso",
explicacao:"A abelha pode picar."},

{nome:"Sapo",emoji:"🐸",resposta:"amigo",
explicacao:"O sapo ajuda a natureza."},

{nome:"Tartaruga",emoji:"🐢",resposta:"amigo",
explicacao:"A tartaruga é tranquila."},

{nome:"Aranha",emoji:"🕷️",resposta:"perigoso",
explicacao:"Algumas aranhas podem picar."},

{nome:"Borboleta",emoji:"🦋",resposta:"amigo",
explicacao:"A borboleta é delicada."},

{nome:"Cobra",emoji:"🐍",resposta:"perigoso",
explicacao:"Algumas cobras são perigosas."},

{nome:"Elefante",emoji:"🐘",resposta:"amigo",
explicacao:"O elefante é grande, mas geralmente é tranquilo."},

{nome:"Gato",emoji:"🐱",resposta:"amigo",
explicacao:"O gato é um animal doméstico que pode ser amigo das pessoas."},

{nome:"Crocodilo",emoji:"🐊",resposta:"perigoso",
explicacao:"O crocodilo é um animal selvagem e pode ser perigoso."},

{nome:"Escorpião",emoji:"🦂",resposta:"perigoso",
explicacao:"O escorpião pode picar e devemos manter distância."}

]

let cartaAtual = null

const tabuleiro = document.getElementById("tabuleiro")

animais.forEach((animal,index)=>{

let carta = document.createElement("div")
carta.className="carta"

carta.innerHTML=`
<div class="carta-inner">

<div class="carta-frente">
${index+1}
</div>

<div class="carta-verso">
<div class="animal">${animal.emoji}</div>
<div class="nome">${animal.nome}</div>
</div>

</div>
`

carta.onclick=()=>{

if(cartaAtual) return

document.getElementById("somCarta").play()

document.getElementById("resposta").innerHTML=""
document.getElementById("explicacao").innerHTML=""

carta.classList.add("virada")

cartaAtual = animal

document.getElementById("botoes").style.display="block"

}

tabuleiro.appendChild(carta)

})

function confete(){

for(let i=0;i<80;i++){

let c=document.createElement("div")

c.className="confete"

c.style.left=Math.random()*100+"vw"

c.style.background=`hsl(${Math.random()*360},100%,50%)`

c.style.animationDuration=2+Math.random()*2+"s"

document.body.appendChild(c)

setTimeout(()=>c.remove(),3000)

}

}

function responder(escolha){

if(!cartaAtual) return

if(escolha===cartaAtual.resposta){

document.getElementById("resposta").innerHTML="🎉 Muito bem!"
confete()

}else{

document.getElementById("resposta").innerHTML="🙂 Vamos aprender!"

}

document.getElementById("explicacao").innerHTML=cartaAtual.explicacao

cartaAtual=null
document.getElementById("botoes").style.display="none"

}

</script>

</body>
</html>
