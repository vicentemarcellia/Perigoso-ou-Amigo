<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Perigoso ou Amigo</title>

<style>

body{
font-family: Arial;
background:#eef7ff;
text-align:center;
}

h1{
margin-top:20px;
}

#tabuleiro{
display:grid;
grid-template-columns: repeat(4,130px);
gap:20px;
justify-content:center;
margin-top:30px;
}

.carta{
width:130px;
height:130px;
background:#4a90e2;
border-radius:10px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
cursor:pointer;
font-size:22px;
}

.numero{
font-size:26px;
font-weight:bold;
}

.carta.virada{
background:white;
color:black;
}

.animal{
font-size:45px;
}

.nome{
font-size:16px;
margin-top:5px;
}

button{
font-size:18px;
padding:10px 20px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.perigoso{
background:#ff6b6b;
color:white;
}

.amigo{
background:#4ecdc4;
color:white;
}

#resposta{
font-size:22px;
margin-top:15px;
}

#explicacao{
font-size:18px;
margin-top:10px;
max-width:600px;
margin-left:auto;
margin-right:auto;
}

</style>
</head>

<body>

<h1>Perigoso ou Amigo</h1>
<p>Escolha uma carta e diga se o animal é perigoso ou amigo.</p>

<div id="tabuleiro"></div>

<div id="botoes" style="display:none">

<button class="perigoso" onclick="responder('perigoso')">
⚠️ Perigoso
</button>

<button class="amigo" onclick="responder('amigo')">
💛 Amigo
</button>

</div>

<div id="resposta"></div>
<div id="explicacao"></div>

<script>

const animais = [

{nome:"Cachorro", emoji:"🐶", resposta:"amigo",
explicacao:"O cachorro costuma ser um grande amigo das pessoas."},

{nome:"Leão", emoji:"🦁", resposta:"perigoso",
explicacao:"O leão é forte e vive na natureza."},

{nome:"Abelha", emoji:"🐝", resposta:"perigoso",
explicacao:"A abelha pode picar se ficar assustada."},

{nome:"Sapo", emoji:"🐸", resposta:"amigo",
explicacao:"O sapo ajuda a natureza comendo insetos."},

{nome:"Tartaruga", emoji:"🐢", resposta:"amigo",
explicacao:"A tartaruga é tranquila e não machuca pessoas."},

{nome:"Aranha", emoji:"🕷️", resposta:"perigoso",
explicacao:"Algumas aranhas podem picar."},

{nome:"Borboleta", emoji:"🦋", resposta:"amigo",
explicacao:"A borboleta é delicada e ajuda a natureza."},

{nome:"Cobra", emoji:"🐍", resposta:"perigoso",
explicacao:"Algumas cobras são perigosas."}

]

let cartaAtual = null

const tabuleiro = document.getElementById("tabuleiro")

animais.forEach((animal, index)=>{

let carta = document.createElement("div")
carta.classList.add("carta")

carta.innerHTML = `<div class="numero">${index+1}</div>`

carta.onclick=()=>{

if(cartaAtual!=null) return

// limpa resposta anterior
document.getElementById("resposta").innerHTML=""
document.getElementById("explicacao").innerHTML=""

// vira carta
carta.classList.add("virada")

carta.innerHTML = `
<div class="animal">${animal.emoji}</div>
<div class="nome">${animal.nome}</div>
`

cartaAtual = animal

document.getElementById("botoes").style.display="block"

}

tabuleiro.appendChild(carta)

})

function responder(escolha){

if(!cartaAtual) return

if(escolha == cartaAtual.resposta){

document.getElementById("resposta").innerHTML="🎉 Muito bem!"

}else{

document.getElementById("resposta").innerHTML="🙂 Vamos aprender!"

}

document.getElementById("explicacao").innerHTML =
cartaAtual.explicacao

cartaAtual = null

document.getElementById("botoes").style.display="none"

}

</script>

</body>
</html>
