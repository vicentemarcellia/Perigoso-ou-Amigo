<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cartas dos Animais</title>

<style>

body{
font-family: Arial;
background:#f0f8ff;
text-align:center;
}

h1{
margin-top:20px;
}

#tabuleiro{
display:grid;
grid-template-columns: repeat(4,120px);
gap:20px;
justify-content:center;
margin-top:30px;
}

.carta{
width:120px;
height:120px;
background:#4a90e2;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
color:white;
cursor:pointer;
}

.carta.virada{
background:white;
color:black;
font-size:60px;
}

button{
font-size:18px;
padding:10px 20px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.perigoso{
background:#ff6b6b;
color:white;
}

.amigo{
background:#4ecdc4;
color:white;
}

#resposta{
font-size:22px;
margin-top:15px;
}

#explicacao{
font-size:18px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>Cartas dos Animais</h1>
<p>Vire uma carta e descubra se é perigoso ou amigo</p>

<div id="tabuleiro"></div>

<div id="botoes" style="display:none">

<button class="perigoso" onclick="responder('perigoso')">⚠️ Perigoso</button>
<button class="amigo" onclick="responder('amigo')">💛 Amigo</button>

</div>

<div id="resposta"></div>
<div id="explicacao"></div>

<script>

const animais = [

{emoji:"🐶", resposta:"amigo",
explicacao:"O cachorro costuma ser amigo das pessoas."},

{emoji:"🦁", resposta:"perigoso",
explicacao:"O leão é forte e vive na natureza."},

{emoji:"🐝", resposta:"perigoso",
explicacao:"A abelha pode picar se ficar assustada."},

{emoji:"🐸", resposta:"amigo",
explicacao:"O sapo ajuda a natureza comendo insetos."},

{emoji:"🐢", resposta:"amigo",
explicacao:"A tartaruga é tranquila."},

{emoji:"🕷️", resposta:"perigoso",
explicacao:"Algumas aranhas podem picar."},

{emoji:"🦋", resposta:"amigo",
explicacao:"A borboleta é delicada."},

{emoji:"🐍", resposta:"perigoso",
explicacao:"Algumas cobras são perigosas."}

]

let cartaAtual = null

const tabuleiro = document.getElementById("tabuleiro")

animais.forEach((animal, index)=>{

let carta = document.createElement("div")
carta.classList.add("carta")
carta.innerHTML="❓"

carta.onclick=()=>{

if(cartaAtual!=null)return

carta.classList.add("virada")
carta.innerHTML=animal.emoji

cartaAtual = animal

document.getElementById("botoes").style.display="block"

}

tabuleiro.appendChild(carta)

})

function responder(escolha){

if(!cartaAtual)return

let correta = cartaAtual.resposta

if(escolha == correta){

document.getElementById("resposta").innerHTML="🎉 Muito bem!"

}else{

document.getElementById("resposta").innerHTML="🙂 Vamos aprender!"

}

document.getElementById("explicacao").innerHTML=cartaAtual.explicacao

cartaAtual = null

document.getElementById("botoes").style.display="none"

}

</script>

</body>
</html>
